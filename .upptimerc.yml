# Change these first
owner: YuhangNie # Your GitHub organization or username, where this repository lives
repo: cfmail-status # The name of this repository
user-agent: YuhangNie

sites:
  - name: Mailbox UI
    slug: frontend
    url: https://mail.dawncv.space
  - name: API Edge
    slug: api-health
    url: https://api.dawncv.space/health_check
  # - name: Hacker News
  #   url: https://news.ycombinator.com
  # - name: Test Broken Site
  #   url: https://thissitedoesnotexist.koj.co
  # - name: IPv6 test
  #   url: forwardemail.net
  #   port: 80
  #   check: "tcp-ping"
  #   ipv6: true

status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  cname: status.dawncv.space
  # baseUrl: /your-repo-name
  theme: light
  logoUrl: https://raw.githubusercontent.com/YuhangNie/cfmail-status/master/assets/dawncv-status-mark.svg
  faviconSvg: https://raw.githubusercontent.com/YuhangNie/cfmail-status/master/assets/dawncv-status-mark.svg
  name: DawnCV Status
  introTitle: "Temporary Email status"
  introMessage: Availability, latency, and incident history for the public mailbox UI and edge API.
  metaTags:
    - name: theme-color
      content: "#0f172a"
    - name: color-scheme
      content: "light dark"
  navbar:
    - title: Status
      href: /
    - title: Mail
      href: https://mail.dawncv.space
    - title: API
      href: https://api.dawncv.space/health_check
  css: |
    :root {
      --body-background-color: #f7f6f1;
      --body-text-color: #111827;
      --muted-text-color: #5f6b7a;
      --card-background-color: rgba(255, 255, 255, 0.88);
      --nav-background-color: rgba(247, 246, 241, 0.84);
      --nav-border-bottom-color: rgba(17, 24, 39, 0.08);
      --nav-current-border-bottom-color: #111827;
      --card-border-color: rgba(17, 24, 39, 0.08);
      --down-border-left-color: #dc2626;
      --down-background-color: #fff1f2;
      --degraded-border-left-color: #d97706;
      --up-border-left-color: #0f766e;
      --tag-color: #ffffff;
      --tag-up-background-color: #0f766e;
      --tag-down-background-color: #dc2626;
      --tag-degraded-background-color: #d97706;
      --change-background-color: rgba(17, 24, 39, 0.06);
      --error-button-border-color: #111827;
      --error-button-background-color: #111827;
      --error-button-color: #ffffff;
      --submit-button-border-color: #111827;
      --submit-button-background-color: #111827;
      --submit-button-color: #ffffff;
      --graph-opacity: 1;
      --graph-filter: none;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --body-background-color: #0b1020;
        --body-text-color: #edf2f7;
        --muted-text-color: #97a1af;
        --card-background-color: rgba(11, 18, 32, 0.82);
        --nav-background-color: rgba(7, 13, 24, 0.72);
        --nav-border-bottom-color: rgba(148, 163, 184, 0.14);
        --nav-current-border-bottom-color: #e5e7eb;
        --card-border-color: rgba(148, 163, 184, 0.15);
        --down-border-left-color: #fb7185;
        --down-background-color: rgba(127, 29, 29, 0.28);
        --degraded-border-left-color: #f59e0b;
        --up-border-left-color: #34d399;
        --tag-up-background-color: #0f766e;
        --tag-down-background-color: #be123c;
        --tag-degraded-background-color: #b45309;
        --change-background-color: rgba(148, 163, 184, 0.08);
        --error-button-border-color: #e2e8f0;
        --error-button-background-color: #e2e8f0;
        --error-button-color: #0b1020;
        --submit-button-border-color: #e2e8f0;
        --submit-button-background-color: #e2e8f0;
        --submit-button-color: #0b1020;
        --graph-opacity: 0.88;
        --graph-filter: saturate(0.95);
      }
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: "Avenir Next", "Segoe UI Variable", "Segoe UI", "Helvetica Neue", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(17, 24, 39, 0.03), transparent 28%),
        radial-gradient(circle at top right, rgba(15, 118, 110, 0.04), transparent 24%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.5) 0%, rgba(255, 255, 255, 0) 34%),
        var(--body-background-color);
      color: var(--body-text-color);
      letter-spacing: -0.01em;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a {
      text-decoration: none;
      transition: color 180ms ease, opacity 180ms ease, transform 180ms ease,
        background-color 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      color: inherit;
      letter-spacing: -0.03em;
      font-weight: 600;
    }

    h2 {
      margin-bottom: 0.9rem;
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted-text-color);
      opacity: 1;
    }

    .container {
      max-width: 1060px;
      padding: 0 1.25rem;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom-color: var(--nav-border-bottom-color);
      background: var(--nav-background-color);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    nav .container {
      min-height: 4.4rem;
      gap: 1rem;
    }

    nav .logo {
      display: inline-flex;
      align-items: center;
      gap: 0.85rem;
      font-size: 0.98rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    nav .logo img {
      width: 2rem;
      height: 2rem;
      padding: 0.35rem;
      border: 1px solid var(--card-border-color);
      border-radius: 0.75rem;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 1px 1px rgba(17, 24, 39, 0.03);
    }

    nav ul {
      gap: 0.22rem;
    }

    nav ul a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.62rem 0.95rem;
      border: 1px solid transparent;
      border-radius: 999px;
      color: var(--muted-text-color);
      font-size: 0.94rem;
      font-weight: 600;
    }

    @media (prefers-color-scheme: dark) {
      nav ul a {
        color: rgba(226, 232, 240, 0.72);
      }
    }

    nav ul a:hover {
      background: rgba(17, 24, 39, 0.05);
      border-color: rgba(17, 24, 39, 0.06);
    }

    [aria-current] {
      border-bottom: none;
      background: #111827;
      color: #ffffff !important;
      box-shadow: none;
    }

    @media (prefers-color-scheme: dark) {
      [aria-current] {
        background: #e5e7eb;
        color: #0b1020 !important;
      }
    }

    main.container {
      padding-top: 2.2rem;
      padding-bottom: 4rem;
    }

    main > header {
      margin-bottom: 1.6rem;
      padding: clamp(1.8rem, 3vw, 2.4rem);
      border: 1px solid var(--card-border-color);
      border-radius: 1.5rem;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.94) 0%, rgba(255, 255, 255, 0.86) 100%);
      box-shadow: none;
    }

    main > header::before {
      content: "Updated every 5 minutes";
      display: inline-flex;
      align-items: center;
      padding: 0.38rem 0.72rem;
      margin-bottom: 0.9rem;
      border: 1px solid rgba(15, 118, 110, 0.14);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.92);
      color: #0f766e;
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    main > header::after {
      display: none;
    }

    main > header h1 {
      max-width: 12ch;
      margin-bottom: 0.9rem;
      font-family: "Avenir Next", "Segoe UI Variable", "Segoe UI", sans-serif;
      font-size: clamp(2.5rem, 5vw, 3.8rem);
      font-weight: 650;
      line-height: 0.95;
      letter-spacing: -0.05em;
    }

    main > header .lead {
      max-width: 50ch;
      font-size: 1rem;
      line-height: 1.7;
      color: var(--muted-text-color);
    }

    @media (prefers-color-scheme: dark) {
      main > header {
        background: linear-gradient(180deg, rgba(11, 18, 32, 0.92) 0%, rgba(11, 18, 32, 0.84) 100%);
      }

      main > header::before {
        background: rgba(15, 23, 42, 0.72);
        color: #99f6e4;
      }

      main > header .lead {
        color: var(--muted-text-color);
      }
    }

    main > h1:not(header h1) {
      margin: 0 0 0.5rem;
      font-size: clamp(2rem, 4vw, 2.7rem);
      font-weight: 650;
      line-height: 1.02;
      letter-spacing: -0.04em;
    }

    main > p,
    main > dl,
    main > h1:not(header h1),
    main > div.f.changed,
    main > section,
    main > article {
      max-width: 100%;
    }

    .loading {
      min-height: 7.2rem;
      border: 1px dashed var(--card-border-color);
      border-radius: 1.2rem;
      background: rgba(255, 255, 255, 0.42);
    }

    article {
      position: relative;
      border-width: 1px;
      border-radius: 1.2rem;
      padding: 1.2rem 1.25rem;
      background: var(--card-background-color);
      box-shadow: none;
    }

    article + article {
      margin-top: 0.8rem;
    }

    article.link:hover {
      border-color: rgba(17, 24, 39, 0.14);
      transform: translateY(-1px);
    }

    article h3,
    article h4 {
      font-size: 1.05rem;
      font-weight: 650;
      letter-spacing: -0.03em;
    }

    article p,
    article small,
    article time,
    dl dd {
      color: var(--muted-text-color);
    }

    main > section:first-of-type article {
      border-left-width: 1px !important;
      background: var(--card-background-color);
    }

    .tag {
      border-radius: 999px;
      padding: 0.36rem 0.66rem;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    main > div.f.changed {
      margin-top: 2rem;
      margin-bottom: 0.9rem;
    }

    form {
      gap: 0.5rem;
      margin-bottom: 0.4rem;
    }

    form div {
      position: relative;
    }

    form input[type="radio"] {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    form label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 3rem;
      padding: 0.54rem 0.84rem;
      border: 1px solid var(--card-border-color);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.74);
      color: var(--muted-text-color);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }

    @media (prefers-color-scheme: dark) {
      form label {
        background: rgba(11, 18, 32, 0.65);
        color: var(--muted-text-color);
      }
    }

    form input[type="radio"]:checked + label {
      border-color: #111827;
      background: #111827;
      color: #ffffff;
      box-shadow: none;
    }

    section.live-status {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }

    section.live-status article {
      min-height: 100%;
      border-left-width: 1px !important;
    }

    section.live-status article img,
    section.live-status article canvas,
    section.live-status article .graph,
    section.live-status article svg:not([height="38"]) {
      display: none !important;
    }

    main img,
    main canvas,
    main svg {
      max-width: 100%;
    }

    main section img:not(nav img):not(article img),
    main section canvas,
    main section svg:not([height="38"]) {
      display: block;
      width: 100%;
      height: auto;
      margin-top: 0.85rem;
      border: 1px solid var(--card-border-color);
      border-radius: 1rem;
      background: rgba(255, 255, 255, 0.66);
      box-sizing: border-box;
    }

    main dl {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem 1.5rem;
      max-width: 40rem;
      margin: 1rem 0 1.25rem;
    }

    main dl dt {
      margin-bottom: 0.35rem;
      color: var(--muted-text-color);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    main dl dd {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--body-text-color);
    }

    .changed + section .data {
      border-radius: 999px;
    }

    footer {
      margin-top: 3rem;
      color: var(--muted-text-color);
      text-align: center;
    }

    footer a {
      text-decoration: underline;
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.18em;
    }

    @media (max-width: 720px) {
      .container {
        padding: 0 1rem;
      }

      nav .container {
        padding-top: 0.72rem;
        padding-bottom: 0.72rem;
      }

      nav ul {
        width: 100%;
        justify-content: flex-start;
      }

      main.container {
        padding-top: 1.5rem;
      }

      main > header {
        padding: 1.35rem;
        border-radius: 1.25rem;
      }

      main > header h1 {
        max-width: none;
        font-size: clamp(2rem, 11vw, 2.8rem);
      }

      main dl {
        grid-template-columns: 1fr;
      }

      section.live-status {
        grid-template-columns: 1fr;
      }
    }

# Upptime also supports notifications, assigning issues, and more
