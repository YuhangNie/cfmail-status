owner: YuhangNie # Your GitHub organization or username, where this repository lives
repo: cfmail-status # The name of this repository
user-agent: YuhangNie

sites:
  - name: Mailbox UI
    slug: frontend
    url: https://mail.dawncv.space
  - name: API Edge
    slug: api-health
    url: https://api.dawncv.space/health_check
  # - name: Hacker News
  #   url: https://news.ycombinator.com
  # - name: Test Broken Site
  #   url: https://thissitedoesnotexist.koj.co
  # - name: IPv6 test
  #   url: forwardemail.net
  #   port: 80
  #   check: "tcp-ping"
  #   ipv6: true

status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  cname: status.dawncv.space
  # baseUrl: /your-repo-name
  theme: light
  logoUrl: /dawncv-status-mark.svg
  faviconSvg: /dawncv-status-mark.svg
  name: DawnCV Status
  introTitle: "Temporary Email Service Health"
  introMessage: Live availability, latency trends, and incident history for the public mailbox UI and edge API.
  metaTags:
    - name: theme-color
      content: "#0f172a"
    - name: color-scheme
      content: "light dark"
  navbar:
    - title: Status
      href: /
    - title: Mail
      href: https://mail.dawncv.space
    - title: API
      href: https://api.dawncv.space/health_check
  css: |
    :root {
      --body-background-color: #f6f2e8;
      --body-text-color: #101828;
      --card-background-color: rgba(255, 255, 255, 0.88);
      --nav-background-color: rgba(255, 255, 255, 0.78);
      --nav-border-bottom-color: rgba(15, 23, 42, 0.09);
      --nav-current-border-bottom-color: #0f766e;
      --card-border-color: rgba(15, 23, 42, 0.08);
      --down-border-left-color: #dc2626;
      --down-background-color: #fff1f2;
      --degraded-border-left-color: #d97706;
      --up-border-left-color: #0f766e;
      --tag-color: #ffffff;
      --tag-up-background-color: #0f766e;
      --tag-down-background-color: #dc2626;
      --tag-degraded-background-color: #d97706;
      --change-background-color: rgba(15, 118, 110, 0.12);
      --error-button-border-color: #0f172a;
      --error-button-background-color: #0f172a;
      --error-button-color: #ffffff;
      --submit-button-border-color: #0f172a;
      --submit-button-background-color: #0f172a;
      --submit-button-color: #ffffff;
      --graph-opacity: 1;
      --graph-filter: none;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --body-background-color: #09111e;
        --body-text-color: #edf2f7;
        --card-background-color: rgba(11, 18, 32, 0.82);
        --nav-background-color: rgba(7, 13, 24, 0.72);
        --nav-border-bottom-color: rgba(148, 163, 184, 0.14);
        --nav-current-border-bottom-color: #8dd3c4;
        --card-border-color: rgba(148, 163, 184, 0.15);
        --down-border-left-color: #fb7185;
        --down-background-color: rgba(127, 29, 29, 0.28);
        --degraded-border-left-color: #f59e0b;
        --up-border-left-color: #5eead4;
        --tag-up-background-color: #0f766e;
        --tag-down-background-color: #be123c;
        --tag-degraded-background-color: #b45309;
        --change-background-color: rgba(94, 234, 212, 0.12);
        --error-button-border-color: #e2e8f0;
        --error-button-background-color: #e2e8f0;
        --error-button-color: #09111e;
        --submit-button-border-color: #e2e8f0;
        --submit-button-background-color: #e2e8f0;
        --submit-button-color: #09111e;
        --graph-opacity: 0.92;
        --graph-filter: saturate(1.05);
      }
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: "Avenir Next", "Segoe UI Variable", "Segoe UI", "Helvetica Neue", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(245, 158, 11, 0.10), transparent 24%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.48) 0%, rgba(255, 255, 255, 0) 34%),
        var(--body-background-color);
      color: var(--body-text-color);
      letter-spacing: -0.01em;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a {
      text-decoration: none;
      transition: color 180ms ease, opacity 180ms ease, transform 180ms ease,
        background-color 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      color: inherit;
      letter-spacing: -0.03em;
    }

    h2 {
      margin-bottom: 0.9rem;
      font-size: 0.86rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.72;
    }

    .container {
      max-width: 1120px;
      padding: 0 1.5rem;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom-color: var(--nav-border-bottom-color);
      background: var(--nav-background-color);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    nav .container {
      min-height: 4.75rem;
      gap: 1rem;
    }

    nav .logo {
      display: inline-flex;
      align-items: center;
      gap: 0.9rem;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    nav .logo img {
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 0.9rem;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.12);
    }

    nav ul {
      gap: 0.35rem;
    }

    nav ul a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.62rem 0.92rem;
      border: 1px solid transparent;
      border-radius: 999px;
      color: rgba(15, 23, 42, 0.72);
      font-size: 0.94rem;
      font-weight: 600;
    }

    @media (prefers-color-scheme: dark) {
      nav ul a {
        color: rgba(226, 232, 240, 0.78);
      }
    }

    nav ul a:hover {
      background: rgba(15, 118, 110, 0.08);
      border-color: rgba(15, 118, 110, 0.12);
    }

    [aria-current] {
      border-bottom: none;
      background: #0f172a;
      color: #ffffff !important;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.18);
    }

    @media (prefers-color-scheme: dark) {
      [aria-current] {
        background: #e2e8f0;
        color: #09111e !important;
      }
    }

    main.container {
      padding-top: 3.5rem;
    }

    main > header {
      position: relative;
      overflow: hidden;
      margin-bottom: 2rem;
      padding: clamp(2rem, 4vw, 3rem);
      border: 1px solid var(--card-border-color);
      border-radius: 1.75rem;
      background:
        radial-gradient(circle at top right, rgba(15, 118, 110, 0.16), transparent 33%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.94) 0%, rgba(255, 255, 255, 0.82) 100%);
      box-shadow: 0 24px 70px rgba(15, 23, 42, 0.08);
    }

    @media (prefers-color-scheme: dark) {
      main > header {
        background:
          radial-gradient(circle at top right, rgba(94, 234, 212, 0.14), transparent 33%),
          linear-gradient(180deg, rgba(11, 18, 32, 0.96) 0%, rgba(11, 18, 32, 0.82) 100%);
        box-shadow: 0 22px 60px rgba(2, 6, 23, 0.32);
      }
    }

    main > header::before {
      content: "Updated every 5 minutes";
      display: inline-flex;
      align-items: center;
      padding: 0.45rem 0.8rem;
      margin-bottom: 1rem;
      border: 1px solid rgba(15, 118, 110, 0.14);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.76);
      color: #0f766e;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    @media (prefers-color-scheme: dark) {
      main > header::before {
        background: rgba(15, 23, 42, 0.68);
        color: #8dd3c4;
      }
    }

    main > header::after {
      content: "";
      position: absolute;
      right: -5rem;
      bottom: -5.5rem;
      width: 16rem;
      height: 16rem;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(15, 118, 110, 0.20) 0%, transparent 70%);
      pointer-events: none;
    }

    main > header h1 {
      max-width: 10ch;
      margin-bottom: 1rem;
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
      font-size: clamp(3rem, 7vw, 4.9rem);
      font-weight: 700;
      line-height: 0.95;
      letter-spacing: -0.06em;
    }

    main > header .lead {
      max-width: 58ch;
      font-size: 1.04rem;
      line-height: 1.75;
      color: rgba(15, 23, 42, 0.72);
    }

    @media (prefers-color-scheme: dark) {
      main > header .lead {
        color: rgba(226, 232, 240, 0.72);
      }
    }

    .loading {
      min-height: 8.5rem;
      border: 1px dashed var(--card-border-color);
      border-radius: 1.35rem;
      background: rgba(255, 255, 255, 0.48);
    }

    @media (prefers-color-scheme: dark) {
      .loading {
        background: rgba(11, 18, 32, 0.52);
      }
    }

    article {
      border-width: 1px;
      border-radius: 1.35rem;
      padding: 1.2rem 1.25rem;
      box-shadow: 0 16px 48px rgba(15, 23, 42, 0.07);
    }

    article + article {
      margin-top: 0.85rem;
    }

    article.link:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 52px rgba(15, 23, 42, 0.11);
    }

    article.up {
      border-left-width: 0.28rem;
    }

    article.down,
    article.degraded {
      border-left-width: 0.28rem;
    }

    article h3,
    article h4 {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    article p,
    article small,
    article time,
    dl dd {
      color: rgba(15, 23, 42, 0.68);
    }

    @media (prefers-color-scheme: dark) {
      article p,
      article small,
      article time,
      dl dd {
        color: rgba(226, 232, 240, 0.68);
      }
    }

    main > section:first-of-type article {
      border-left-width: 0 !important;
      background:
        linear-gradient(135deg, rgba(15, 118, 110, 0.09), rgba(15, 118, 110, 0.02)),
        var(--card-background-color);
    }

    .tag {
      border-radius: 999px;
      padding: 0.42rem 0.72rem;
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    form {
      gap: 0.55rem;
      margin-bottom: 0.4rem;
    }

    form div {
      position: relative;
    }

    form input[type="radio"] {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    form label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 3rem;
      padding: 0.56rem 0.82rem;
      border: 1px solid var(--card-border-color);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.68);
      color: rgba(15, 23, 42, 0.7);
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
    }

    @media (prefers-color-scheme: dark) {
      form label {
        background: rgba(11, 18, 32, 0.65);
        color: rgba(226, 232, 240, 0.76);
      }
    }

    form input[type="radio"]:checked + label {
      border-color: #0f172a;
      background: #0f172a;
      color: #ffffff;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.18);
    }

    @media (prefers-color-scheme: dark) {
      form input[type="radio"]:checked + label {
        border-color: #e2e8f0;
        background: #e2e8f0;
        color: #09111e;
      }
    }

    section.live-status {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }

    section.live-status article {
      min-height: 100%;
    }

    article .graph,
    article img {
      border-radius: 1rem;
    }

    .changed + section .data {
      border-radius: 0.75rem;
    }

    footer {
      margin-top: 4rem;
      color: rgba(15, 23, 42, 0.58);
      text-align: center;
    }

    @media (prefers-color-scheme: dark) {
      footer {
        color: rgba(226, 232, 240, 0.58);
      }
    }

    footer a {
      text-decoration: underline;
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.18em;
    }

    @media (max-width: 720px) {
      .container {
        padding: 0 1rem;
      }

      nav .container {
        padding-top: 0.8rem;
        padding-bottom: 0.8rem;
      }

      nav ul {
        width: 100%;
        justify-content: flex-start;
      }

      main.container {
        padding-top: 2rem;
      }

      main > header {
        padding: 1.5rem;
        border-radius: 1.4rem;
      }

      main > header h1 {
        max-width: none;
        font-size: clamp(2.4rem, 12vw, 3.2rem);
      }

      form {
        width: 100%;
      }
    }

