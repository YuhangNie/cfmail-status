# Change these first
owner: YuhangNie # Your GitHub organization or username, where this repository lives
repo: cfmail-status # The name of this repository
user-agent: YuhangNie

sites:
  - name: Mailbox UI
    slug: frontend
    url: https://mail.dawncv.space
  - name: API Edge
    slug: api-health
    url: https://api.dawncv.space/health_check
  # - name: Hacker News
  #   url: https://news.ycombinator.com
  # - name: Test Broken Site
  #   url: https://thissitedoesnotexist.koj.co
  # - name: IPv6 test
  #   url: forwardemail.net
  #   port: 80
  #   check: "tcp-ping"
  #   ipv6: true

status-website:
  # Add your custom domain name, or remove the `cname` line if you don't have a domain
  # Uncomment the `baseUrl` line if you don't have a custom domain and add your repo name there
  cname: status.dawncv.space
  # baseUrl: /your-repo-name
  theme: light
  logoUrl: https://raw.githubusercontent.com/YuhangNie/cfmail-status/master/assets/logo.png
  favicon: https://raw.githubusercontent.com/YuhangNie/cfmail-status/master/assets/logo.png
  name: Temporary email
  introTitle: "System status"
  introMessage: Latest service status for the Temporary email platform.
  metaTags:
    - name: theme-color
      content: "#ffffff"
    - name: color-scheme
      content: "light dark"
  navbar:
    - title: Status
      href: /
    - title: Mail
      href: https://mail.dawncv.space
    - title: API
      href: https://api.dawncv.space/health_check
  css: |
    :root {
      --body-background-color: #ffffff;
      --body-text-color: #333639;
      --muted-text-color: #7a8087;
      --card-background-color: #ffffff;
      --nav-background-color: #ffffff;
      --nav-border-bottom-color: #efeff5;
      --nav-current-border-bottom-color: #18a058;
      --card-border-color: #efeff5;
      --down-border-left-color: #dc2626;
      --down-background-color: #fff1f2;
      --degraded-border-left-color: #d97706;
      --up-border-left-color: #18a058;
      --tag-color: #ffffff;
      --tag-up-background-color: #18a058;
      --tag-down-background-color: #dc2626;
      --tag-degraded-background-color: #d97706;
      --change-background-color: #f8f9fb;
      --bar-track-color: #eceef2;
      --bar-divider-color: rgba(255, 255, 255, 0.92);
      --error-button-border-color: #111827;
      --error-button-background-color: #111827;
      --error-button-color: #ffffff;
      --submit-button-border-color: #111827;
      --submit-button-background-color: #111827;
      --submit-button-color: #ffffff;
      --graph-opacity: 1;
      --graph-filter: none;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --body-background-color: #0d1117;
        --body-text-color: #edf2f7;
        --muted-text-color: #9aa5b3;
        --card-background-color: #121821;
        --nav-background-color: #0d1117;
        --nav-border-bottom-color: rgba(148, 163, 184, 0.14);
        --nav-current-border-bottom-color: #63e2b7;
        --card-border-color: rgba(148, 163, 184, 0.15);
        --down-border-left-color: #fb7185;
        --down-background-color: rgba(127, 29, 29, 0.24);
        --degraded-border-left-color: #f59e0b;
        --up-border-left-color: #63e2b7;
        --tag-up-background-color: #18a058;
        --tag-down-background-color: #be123c;
        --tag-degraded-background-color: #b45309;
        --change-background-color: rgba(148, 163, 184, 0.08);
        --bar-track-color: rgba(148, 163, 184, 0.14);
        --bar-divider-color: rgba(13, 17, 23, 0.9);
        --error-button-border-color: #e2e8f0;
        --error-button-background-color: #e2e8f0;
        --error-button-color: #0b1020;
        --submit-button-border-color: #e2e8f0;
        --submit-button-background-color: #e2e8f0;
        --submit-button-color: #0b1020;
        --graph-opacity: 0.88;
        --graph-filter: saturate(0.95);
      }
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      font-family: Inter, "Segoe UI Variable", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      background: var(--body-background-color);
      color: var(--body-text-color);
      letter-spacing: -0.012em;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a {
      text-decoration: none;
      transition: color 180ms ease, opacity 180ms ease, transform 180ms ease,
        background-color 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      color: inherit;
      letter-spacing: -0.03em;
      font-weight: 600;
    }

    h2 {
      margin-bottom: 0.9rem;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted-text-color);
      opacity: 1;
    }

    .container {
      max-width: 1180px;
      padding: 0 2rem;
    }

    nav {
      position: relative;
      top: auto;
      z-index: 10;
      border-bottom-width: 1px;
      border-bottom-color: var(--nav-border-bottom-color);
      background: var(--nav-background-color);
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }

    nav .container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 4.1rem;
      gap: 1.5rem;
    }

    nav .logo {
      display: inline-flex;
      align-items: center;
      gap: 0.72rem;
      line-height: 1;
      font-size: 0.92rem;
      font-weight: 650;
      letter-spacing: -0.02em;
    }

    nav .logo img {
      display: block;
      width: 2rem;
      height: 2rem;
      flex: 0 0 2rem;
      padding: 0;
      border: 0;
      border-radius: 0.45rem;
      background: transparent;
      box-shadow: none;
      object-fit: cover;
      aspect-ratio: 1 / 1;
    }

    nav ul {
      margin-left: auto;
      gap: 1.25rem;
    }

    nav ul a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border: 0;
      border-bottom: 1px solid transparent;
      border-radius: 0;
      color: var(--muted-text-color);
      font-size: 0.88rem;
      font-weight: 600;
    }

    @media (prefers-color-scheme: dark) {
      nav ul a {
        color: rgba(226, 232, 240, 0.72);
      }
    }

    nav ul a:hover {
      background: transparent;
      border-color: rgba(24, 160, 88, 0.2);
      color: var(--body-text-color);
    }

    [aria-current] {
      border-bottom-color: #18a058;
      background: transparent;
      color: #18a058 !important;
      box-shadow: none;
    }

    @media (prefers-color-scheme: dark) {
      [aria-current] {
        background: transparent;
        color: #63e2b7 !important;
      }
    }

    main.container {
      max-width: 718px;
      margin: 0 auto;
      padding-top: 1.35rem;
      padding-bottom: 4rem;
    }

    main > header {
      display: none;
    }

    main > h1:not(header h1) {
      margin: 0 0 0.75rem;
      font-size: clamp(1.9rem, 4vw, 2.45rem);
      font-weight: 600;
      line-height: 1.04;
      letter-spacing: -0.04em;
    }

    main > p,
    main > dl,
    main > h1:not(header h1),
    main > div.f.changed,
    main > section,
    main > article {
      max-width: 100%;
    }

    main > section:empty {
      display: none;
    }

    .loading {
      min-height: 7.2rem;
      border: 1px dashed var(--card-border-color);
      border-radius: 1rem;
      background: rgba(255, 255, 255, 0.45);
    }

    article {
      position: relative;
      border-width: 1px;
      border-radius: 1rem;
      padding: 1.1rem 1.2rem;
      background: var(--card-background-color);
      box-shadow: none;
    }

    article + article {
      margin-top: 0.8rem;
    }

    article.link:hover {
      border-color: rgba(17, 24, 39, 0.14);
      transform: translateY(-1px);
    }

    article h3,
    article h4 {
      font-size: 1.05rem;
      font-weight: 650;
      letter-spacing: -0.03em;
    }

    article p,
    article small,
    article time,
    dl dd {
      color: var(--muted-text-color);
    }

    main > article.up,
    main > article.down,
    main > article.degraded {
      margin: 0;
      padding: 1.05rem 1.2rem 1.05rem 3rem;
      border: 1px solid rgba(24, 160, 88, 0.16);
      border-radius: 1rem 1rem 0 0;
      border-bottom-color: var(--card-border-color);
      background: var(--card-background-color);
      color: transparent;
      min-height: 1.45rem;
      box-shadow: none;
    }

    main > article.up::before,
    main > article.down::before,
    main > article.degraded::before {
      content: "";
      position: absolute;
      left: 1.15rem;
      top: 1.08rem;
      width: 1.1rem;
      height: 1.1rem;
      border-radius: 999px;
    }

    main > article.up::before {
      background: rgba(24, 160, 88, 0.12);
      box-shadow: inset 0 0 0 1px rgba(24, 160, 88, 0.18);
    }

    main > article.up::after,
    main > article.down::after,
    main > article.degraded::after {
      position: absolute;
      left: 3rem;
      top: 1rem;
      color: var(--body-text-color);
      font-size: 0.97rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    main > article.up::after {
      content: "We're fully operational";
    }

    main > article.down::after {
      content: "Some systems are experiencing issues";
    }

    main > article.degraded::after {
      content: "Some systems are degraded";
    }

    main > article.down::before {
      background: rgba(220, 38, 38, 0.12);
      box-shadow: inset 0 0 0 1px rgba(220, 38, 38, 0.2);
    }

    main > article.degraded::before {
      background: rgba(217, 119, 6, 0.12);
      box-shadow: inset 0 0 0 1px rgba(217, 119, 6, 0.2);
    }

    .tag {
      border-radius: 999px;
      padding: 0.28rem 0.58rem;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    main > div.f.changed {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin-top: 1rem;
      margin-bottom: 0;
      padding: 1.05rem 1.2rem;
      border: 1px solid var(--card-border-color);
      border-top: 0;
      border-bottom: 0;
      background: var(--card-background-color);
    }

    main > div.f.changed h2 {
      position: relative;
      margin: 0;
      color: transparent;
    }

    main > div.f.changed h2::after {
      content: "System status";
      position: absolute;
      inset: 0 auto auto 0;
      color: var(--body-text-color);
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      text-transform: none;
    }

    form {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0;
    }

    form div {
      position: relative;
    }

    form input[type="radio"] {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    form label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 2.8rem;
      padding: 0.42rem 0.72rem;
      border: 1px solid var(--card-border-color);
      border-radius: 999px;
      background: transparent;
      color: var(--muted-text-color);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
    }

    @media (prefers-color-scheme: dark) {
      form label {
        background: transparent;
        color: var(--muted-text-color);
      }
    }

    form input[type="radio"]:checked + label {
      border-color: #18a058;
      background: #18a058;
      color: #ffffff;
      box-shadow: none;
    }

    section.live-status {
      display: block;
      margin-top: 0;
      border: 1px solid var(--card-border-color);
      border-top: 0;
      border-radius: 0 0 1rem 1rem;
      overflow: hidden;
      background: var(--card-background-color);
    }

    section.live-status article {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      grid-template-areas:
        "title uptime"
        "bar bar"
        "latency latency";
      gap: 0.42rem 1.25rem;
      min-height: 100%;
      border: 0;
      border-left-width: 0 !important;
      border-radius: 0;
      background: var(--card-background-color) !important;
      background-image: none !important;
      background-size: auto !important;
      background-repeat: no-repeat !important;
      padding: 1rem 1.25rem;
      overflow: hidden;
      --bar-width: 100%;
      --bar-fill-color: #18a058;
    }

    section.live-status article + article {
      margin-top: 0;
      border-top: 1px solid var(--card-border-color);
    }

    section.live-status article h4 {
      grid-area: title;
      display: flex;
      align-items: center;
      gap: 0.65rem;
      margin: 0;
      min-width: 0;
    }

    section.live-status article h4 a {
      color: var(--body-text-color);
      font-size: 0.98rem;
      font-weight: 600;
      line-height: 1.35;
    }

    section.live-status article .icon {
      display: none;
    }

    section.live-status article.up h4::before,
    section.live-status article.down h4::before,
    section.live-status article.degraded h4::before {
      content: "";
      display: inline-flex;
      width: 0.5rem;
      height: 0.5rem;
      border-radius: 999px;
      background: #18a058;
      box-shadow: 0 0 0 4px rgba(24, 160, 88, 0.11);
      flex: 0 0 auto;
    }

    section.live-status article.degraded h4::before {
      background: #d97706;
      box-shadow: 0 0 0 4px rgba(217, 119, 6, 0.14);
    }

    section.live-status article.degraded {
      --bar-width: 68%;
      --bar-fill-color: #d97706;
    }

    section.live-status article.down h4::before {
      background: #dc2626;
      box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.12);
    }

    section.live-status article.down {
      --bar-width: 24%;
      --bar-fill-color: #dc2626;
    }

    section.live-status article img,
    section.live-status article canvas,
    section.live-status article .graph,
    section.live-status article svg:not([height="38"]) {
      display: none !important;
    }

    section.live-status article::after {
      content: "";
      grid-area: bar;
      display: block;
      width: 100%;
      height: 0.9rem;
      border-radius: 999px;
      box-shadow: inset 0 0 0 1px rgba(17, 24, 39, 0.04);
      background:
        repeating-linear-gradient(
          90deg,
          transparent 0 16px,
          var(--bar-divider-color) 16px 18px
        ),
        linear-gradient(
          90deg,
          var(--bar-fill-color) 0 var(--bar-width),
          var(--bar-track-color) var(--bar-width) 100%
        );
      overflow: hidden;
    }

    section.live-status article > div {
      color: var(--muted-text-color);
      font-size: 0.84rem;
      white-space: nowrap;
      text-align: right;
    }

    section.live-status article > div:first-of-type {
      grid-area: uptime;
      justify-self: end;
    }

    section.live-status article > div:last-of-type {
      grid-area: latency;
      justify-self: start;
      text-align: left;
    }

    section.live-status article > div .data {
      margin-left: 0.28rem;
      color: var(--body-text-color);
      font-weight: 600;
    }

    main img,
    main canvas,
    main svg {
      max-width: 100%;
    }

    main > section:first-of-type {
      margin-bottom: 1rem;
      padding: 1.2rem 1.2rem 1rem;
      border: 1px solid var(--card-border-color);
      border-radius: 1rem;
      background: var(--card-background-color);
    }

    main > section:first-of-type h1 {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin: 0 0 1rem;
    }

    main > section:first-of-type h1 a {
      color: var(--body-text-color);
    }

    main > section:first-of-type dl {
      max-width: none;
      padding: 1rem 0 0;
      border: 0;
      border-top: 1px solid var(--card-border-color);
      border-radius: 0;
      background: transparent;
    }

    main > section:nth-of-type(2) {
      padding: 1.15rem 1.2rem 1.2rem;
      border: 1px solid var(--card-border-color);
      border-radius: 1rem;
      background: var(--card-background-color);
    }

    main > section:nth-of-type(2) h2 {
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      text-transform: none;
      color: var(--body-text-color);
      margin-bottom: 0;
    }

    main section img:not(nav img):not(article img),
    main section canvas,
    main section svg:not([height="38"]) {
      display: block;
      width: 100%;
      height: auto;
      margin-top: 1rem;
      border: 0;
      border-radius: 0.85rem;
      background: rgba(243, 244, 246, 0.92);
      box-sizing: border-box;
    }

    main dl {
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 0.85rem 1rem;
      max-width: 28rem;
      margin: 0;
      padding: 1rem 1.2rem;
      border: 1px solid var(--card-border-color);
      border-radius: 1rem;
      background: var(--card-background-color);
    }

    main dl dt {
      margin: 0;
      color: var(--muted-text-color);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    main dl dd {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      color: var(--body-text-color);
      text-align: right;
    }

    .changed + section .data {
      border-radius: 999px;
    }

    footer {
      margin-top: 2.25rem;
      padding: 0 1.25rem 2rem;
      color: var(--muted-text-color);
      text-align: center;
    }

    footer p {
      max-width: 718px;
      margin: 0 auto;
      padding-top: 1.25rem;
      border-top: 1px solid var(--card-border-color);
      font-size: 0.8rem;
    }

    footer a {
      text-decoration: underline;
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.18em;
    }

    @media (max-width: 720px) {
      .container {
        padding: 0 1rem;
      }

      nav .container {
        width: calc(100% - 2rem);
        min-height: auto;
        padding-top: 0.85rem;
        padding-bottom: 0.85rem;
      }

      nav ul {
        width: auto;
        justify-content: flex-end;
      }

      main.container {
        padding-top: 1rem;
      }

      main dl {
        grid-template-columns: 1fr;
      }

      main dl dd {
        text-align: left;
      }

      main > div.f.changed {
        align-items: flex-start;
        flex-direction: column;
        padding: 1rem;
      }

      section.live-status {
        display: block;
      }

      section.live-status article {
        grid-template-columns: 1fr;
        grid-template-areas:
          "title"
          "uptime"
          "bar"
          "latency";
        gap: 0.45rem;
      }

      section.live-status article h4 {
        flex-wrap: wrap;
      }

      section.live-status article > div:first-of-type,
      section.live-status article > div:last-of-type {
        justify-self: start;
        text-align: left;
        white-space: normal;
      }

      main > section:nth-of-type(2) {
        padding: 0.95rem;
      }
    }

# Upptime also supports notifications, assigning issues, and more
# See https://upptime.js.org/docs/configuration
